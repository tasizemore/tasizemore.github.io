<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP - Carly & Tim</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">C & T</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="rsvp.html" class="active">RSVP</a></li>
                <li><a href="https://withjoy.com/timothy-and-carly-oct-2027/registry" target="_blank"
                        rel="noopener noreferrer">Registry</a></li>
            </ul>
        </div>
    </nav>

    <section class="rsvp-section">
        <div class="container">
            <h2>RSVP</h2>
            <p>Please respond by September 1st, 2026</p>

            <form id="rsvp-form" class="rsvp-form">

                <div class="form-group">
                    <label for="name">Full Name(s)</label>
                    <input type="text" id="name" name="name" placeholder="Bilbo Baggins" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="bilbo@shire.com" required>
                </div>

                <div class="form-group">
                    <label>Will you be attending?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="attendance" value="Yes" required> Yes, I'm ready for an
                            adventure!</label>
                        <label><input type="radio" name="attendance" value="No"> Alas, I cannot venture forth.</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="guests">Number of Guests (including you!)</label>
                    <select id="guests" name="guests">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="form-group">
                    <p><em>Dinner will be served with fresh bread, a mixed green salad with a choice of Italian or ranch
                            dressing, and accompanied by coffee, tea, and an open bar.</em></p>

                    <div id="dynamic-entrees">
                    </div>
                </div>

                <!-- <div class="form-group">
                    <label for="meal">Meal Choice</label>
                    <p><em>Dinner will be served with fresh bread, a mixed green salad with a choice of Italian or ranch dressing, and accompanied by coffee, tea, and an open bar.</em></p>
                    <div class="radio-group">
                        <label><input type="radio" name="meal" value="chicken" required> Chicken Alfredo Penne</label>
                        <label><input type="radio" name="meal" value="meatball"> Meatball Marinara Penne</label>
                        <label><input type="radio" name="meal" value="special"> Neither, I have a special dietary restriction.</label>
                    </div>
                </div> -->

                <div class="form-group">
                    <label for="dietary">Dietary Restrictions</label>
                    <textarea id="dietary" name="message"
                        placeholder="Boil 'em, mash 'em, stick 'em in a stew..."></textarea>
                </div>

                <button type="submit" id="submit-btn">Send RSVP</button>
            </form>
        </div>
    </section>

    <script>
        function updateEntreeFields() {
            const guestCount = document.getElementById('guests').value;
            const container = document.getElementById('dynamic-entrees');

            // Clear existing fields
            container.innerHTML = '';

            // Generate new fields for each guest
            for (let i = 1; i <= guestCount; i++) {
                container.innerHTML += `
            <div style="margin-bottom: 15px;">
                <p><strong>Guest ${i} Entree:</strong></p>
                <div>
                    <input type="radio" id="chicken_${i}" name="entree_${i}" value="Chicken Alfredo Penne" required>
                    <label for="chicken_${i}">Chicken Alfredo Penne</label>
                </div>
                <div>
                    <input type="radio" id="meatball_${i}" name="entree_${i}" value="Meatball Marinara Penne">
                    <label for="meatball_${i}">Meatball Marinara Penne</label>
                </div>
                <div>
                    <input type="radio" id="special_${i}" name="entree_${i}" value="Neither, there is a special dietary restriction noted below.">
                    <label for="special_${i}">Neither</label>
                </div>
            </div>
        `;
            }
        }

        // Run once when the page loads to show the field for Guest 1
        document.addEventListener('DOMContentLoaded', updateEntreeFields);

        // Run every time the guest dropdown is changed
        document.getElementById('guests').addEventListener('change', updateEntreeFields);
    </script>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzzgFnxj9566GoI-kkNamoZTDo5CU3vkkrjF4_fWMEJ4eL0sK1W1aBDPQtS4G97Jek/exec';
        const form = document.getElementById('rsvp-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', e => {
            e.preventDefault();

            const attendanceValue = document.querySelector('input[name="attendance"]:checked').value;

            btn.disabled = true;
            btn.innerHTML = "Consulting the Council...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    // Conditional Logic
                    // Check if the value contains "adventure" (for Yes) or "Alas" (for No)
                    if (attendanceValue.includes("Yes")) {
                        window.location.href = "thank-you.html";
                    } else {
                        window.location.href = "regrets.html";
                    }
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('A shadow has fallen on the form. Please try again!');
                    btn.disabled = false;
                    btn.innerHTML = "Send RSVP";
                });
        });
    </script>

    <footer>
        <p>We can't wait to celebrate with you!</p>
    </footer>

</body>

</html>
